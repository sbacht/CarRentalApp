services:
  carrentalapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carrentalapp
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/app/data/CarRentalApp.db
    volumes:
      - carrentalapp-data:/app/data

volumes:
  carrentalapp-data:
